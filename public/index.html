<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body class="lobby">

<h1>🔥 Литвин. Путь к хайпу 🔥</h1>

<input id="name" placeholder="Имя">
<input id="room" placeholder="Комната">

<div class="tokens">
  <div class="tokenSelect red" data-color="red"></div>
  <div class="tokenSelect yellow" data-color="yellow"></div>
  <div class="tokenSelect blue" data-color="blue"></div>
  <div class="tokenSelect purple" data-color="purple"></div>
</div>

<button id="joinBtn">Войти</button>

<div id="players"></div>

<button id="startBtn" class="hidden">Начать игру</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let selected = null;

document.querySelectorAll(".tokenSelect").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tokenSelect").forEach(el=>el.classList.remove("active"));
    t.classList.add("active");
    selected = t.dataset.color;
  };
});

document.getElementById("joinBtn").onclick = ()=>{
  const name = document.getElementById("name").value;
  const room = document.getElementById("room").value;

  localStorage.setItem("name", name);
  localStorage.setItem("room", room);
  localStorage.setItem("token", selected);

  socket.emit("join", {name, room, token:selected});
};

socket.on("players", players=>{
  document.getElementById("players").innerHTML =
    players.map(p=>p.name+" ("+p.token+")").join("<br>");

  if(players[0].id === socket.id){
    document.getElementById("startBtn").classList.remove("hidden");
  }
});

document.getElementById("startBtn").onclick = ()=>{
  socket.emit("startGame");
};

socket.on("startGame", ()=>{
  window.location.href="game.html";
});
</script>

</body>
</html>
