<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">🔥 Литвин. Путь к хайпу</h1>

<input id="name" placeholder="Имя">
<input id="room" placeholder="Комната">

<button onclick="join()">Войти</button>
<button onclick="start()">Начать игру</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function join(){
  const name = document.getElementById("name").value;
  const room = document.getElementById("room").value;

  localStorage.setItem("name", name);
  localStorage.setItem("room", room);
  localStorage.setItem("token", "red");

  socket.emit("join", {name, room, token:"red"});
}

function start(){
  socket.emit("startGame");
}

socket.on("startGame", ()=>{
  window.location.href = "game.html";
});
</script>

</body>
</html>
