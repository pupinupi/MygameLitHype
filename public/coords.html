<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.board{
  width:95vw;
  max-width:500px;
  margin-top:20px;
}

#output{
  margin-top:20px;
  padding:10px;
  background:#111;
  border:1px solid cyan;
  min-height:100px;
  font-size:14px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📍 Кликни по клеткам по порядку</h2>

<img src="board.jpg" class="board" id="board">

<div id="output"></div>

<script>
const board = document.getElementById("board");
const output = document.getElementById("output");

let coords = [];

board.addEventListener("click", (e)=>{
  const rect = board.getBoundingClientRect();

  const x = Math.round(e.clientX - rect.left);
  const y = Math.round(e.clientY - rect.top);

  coords.push({x,y});

  output.innerText = JSON.stringify(coords, null, 2);
});
</script>

</body>
</html>
