<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coordinate Editor</title>
<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  border:2px solid cyan;
  margin-top:10px;
}

#panel{
  margin-top:10px;
  padding:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  background:orange;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

pre{
  background:#111;
  padding:10px;
  width:90%;
  margin:auto;
  text-align:left;
  overflow:auto;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🎯 Координатный редактор клеток</h2>

<canvas id="c" width="500" height="500"></canvas>

<div id="panel">
  <button onclick="copy()">📋 Копировать</button>
  <button onclick="undo()">↩ Undo</button>
  <button onclick="clearAll()">🧹 Clear</button>
</div>

<pre id="out"></pre>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let points = [];

// 🖱 клик по канвасу
canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();

  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  points.push({x, y});

  draw();
  updateOutput();
});

// 🎨 рисуем точки
function draw(){
  ctx.clearRect(0,0,500,500);

  points.forEach((p,i)=>{
    const x = p.x * 500;
    const y = p.y * 500;

    ctx.beginPath();
    ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle="cyan";
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(i, x+8, y-8);
  });
}

// 📤 вывод массива
function updateOutput(){
  document.getElementById("out").innerText =
    JSON.stringify(points, null, 2);
}

// 📋 копировать
function copy(){
  navigator.clipboard.writeText(JSON.stringify(points));
  alert("Скопировано!");
}

// ↩ undo
function undo(){
  points.pop();
  draw();
  updateOutput();
}

// 🧹 clear
function clearAll(){
  points = [];
  draw();
  updateOutput();
}
</script>

</body>
</html>
